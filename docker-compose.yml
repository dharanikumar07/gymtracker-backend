services:
    # -------------------
    # Laravel App
    # -------------------
    app:
        build:
            args:
                user: dharanikumar
                uid: 1000
            context: ./
            dockerfile: Dockerfile
        container_name: gymtracker_backend
        restart: unless-stopped
        working_dir: /var/www
        ports:
            - "8000:8000"
        volumes:
            - ./:/var/www
        networks:
            - gym-network
        depends_on:
            - db
            - redis

    # -------------------
    # Postgres database (ports 5433 to avoid conflict with yuko-backend)
    # -------------------
    db:
        image: postgres:latest
        container_name: gym_postgres_db
        restart: unless-stopped
        volumes:
            - gym_postgres_data:/var/lib/postgresql/data/pgdata
        environment:
            POSTGRES_USER: gymtracker
            POSTGRES_PASSWORD: gymtracker
            POSTGRES_DB: gymtracker
            PGDATA: /var/lib/postgresql/data/pgdata
        ports:
            - "5433:5432"
        networks:
            - gym-network

    # -------------------
    # Redis (port 6380 to avoid conflict with yuko-backend)
    # -------------------
    redis:
        image: redis:latest
        container_name: gym_redis
        restart: unless-stopped
        ports:
            - "6380:6379"
        networks:
            - gym-network

networks:
    gym-network:
        driver: bridge

volumes:
    gym_postgres_data:
